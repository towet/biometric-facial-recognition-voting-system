<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Recognition System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a202c;
            color: white;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            background: linear-gradient(to right, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
        .info-box {
            background-color: #2d3748;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        .action-card {
            background: linear-gradient(to right, #6366f1, #8b5cf6, #d946ef);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .action-button {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            margin-top: 0.5rem;
            border-radius: 0.25rem;
            background-color: rgba(139, 92, 246, 0.5);
            color: white;
            text-align: center;
            cursor: pointer;
        }
        #imagePreview {
            max-width: 100%;
            margin-top: 1rem;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Recognition System</h1>
        
        <div class="info-box">
            <h2>How it works</h2>
            <p>Capture your identity using your mobile device's camera or upload an image.</p>
        </div>

        <div class="action-card">
            <h3>Capture with Camera</h3>
            <input type="file" accept="image/*" capture="environment" id="cameraInput">
            <img id="imagePreview" style="display:none;">
        </div>

        <button id="uploadButton" class="action-button" disabled>Verify Identity</button>

        <a href="{{ url_for('logout') }}" class="action-button" style="background-color: #f87171;">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
              <div class="alert {% if 'success' in messages %}alert-success{% else %}alert-warning{% endif %}">
                  {{ messages[0] }}
              </div>
          {% endif %}
        {% endwith %}
    </div>

    <script>
        document.getElementById('cameraInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('uploadButton').disabled = false; // Enable button after image is loaded
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
